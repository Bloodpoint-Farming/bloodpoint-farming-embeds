          # 3. Don't Create Problems
          **A. No Political or Religious Topics** ⚖️
          -# Avoid discussions on politics and religion to maintain a neutral and welcoming.
          environment.
          **B. No Hate Speech or Harmful Language** 😠
          -# Racism, sexism, discrimination, and personal attacks are strictly prohibited.
          **C. Inappropriate Profiles** 👤
          -# Keep publicly displayed info appropriate and respectful for all audiences (username, nickname, avatar, banner, pronouns, about me, connections, etc.).
          **D. No Piracy, NSFW, or Suspicious Content** 🔞
          -# This includes illegal downloads, adult content, or any content that violates [Discord's Terms of Service](https://discord.com/terms).
          **E. Personal Information** 🔒
          -# For everyone’s safety, avoid sharing personal info (addresses, phone numbers, emails, socials, etc.). Webcam feeds are fine for gameplay with overlays, but using them to show faces is not allowed.
