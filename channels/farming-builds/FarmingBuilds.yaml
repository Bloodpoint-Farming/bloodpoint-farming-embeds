# Component V2 types:
# https://discord.com/developers/docs/components/reference#component-object-component-types
- flags: 32768 # IsComponentsV2
  components:
    - type: 12 # media gallery
      items:
        - media: 
            url: attachment://FarmingBuildsBanner.webp
    - type: 17 # container
      accent_color: 2375525 # blueish
      components:
      - type: 10 # text
        content: |-
          Our farming methods make tradeoffs between **BP/hour**, **BP/offering**, and **simplicity**.
          **Video walkthroughs** are available in the links below.
          ## BP/hour
          High BP/hour, lower BP/offering. Good if you have **many offerings** or **limited time** to farm.
          - `~2 min` [Brainless Bubba DC (BBDC)](https://discord.com/channels/1204097271768023090/1396563080862761070/1396563080862761070) `30K` `easy`
          - `~2 min` [Spin Blinding Pyramid Head (SBPH)](https://discord.com/channels/1204097271768023090/1488040267633397870) `34K` `medium`
          ## BP/offering
          Max (`40K`) BP for each offering, but higher difficulty or lower BP/hour.
          - `~4 min` [Pyramid Head R4K (PHR4K)](https://discord.com/channels/1204097271768023090/1476386024220524654/1476386024220524654) `easy`
          - `~4 min` [Vecna RDC (V5DC)](https://discord.com/channels/1204097271768023090/1465725731366768650) `hard`
          - `~6 min` [Reactive 4K (R4K)](https://discord.com/channels/1204097271768023090/1376572491983491072/1376572491983491072) `easy`
          ## 3/4-man (Advanced)
          Some players play **multiple accounts** at once for *both* high BP/hour and BP/offering.
          Alt accounts do not max.
          - `~3 min` [3/4-Man Reactive DC (R3DC, R4DC)](https://discord.com/channels/1204097271768023090/1401649273321422971) `hard`
      - type: 14 # separator
      - type: 10 # text
        content: -# See the [spreadsheet](https://docs.google.com/spreadsheets/d/1m8dF9RnTeqlnLyb1HZAu08hv-mk8POK-2rZU05r8400/edit?usp=sharing) for more builds, time to P100, and other details.

