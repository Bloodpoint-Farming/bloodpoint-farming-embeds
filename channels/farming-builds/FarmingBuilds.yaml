        content: |-
          Each method balances BP/hour, BP/offering, and effort differently. Video walkthroughs are available for each method.
          ### Easy
          - [Brainless Bubba DC (BBDC)](https://discord.com/channels/1204097271768023090/1396563080862761070/1396563080862761070) `~2 min`
          ### Medium
          - [Pyramid Head R4K (PHR4K)](https://discord.com/channels/1204097271768023090/1401503159284793356/1401503159284793356) `~5 min`
          - [Reactive 4K (R4K)](https://discord.com/channels/1204097271768023090/1376572491983491072/1376572491983491072) `~6 min`
          ### Hard
          - [3/4-Man Reactive DC (R3DC, R4DC)](https://discord.com/channels/1204097271768023090/1401649273321422971) `~3 min`
          - [Spin Blight](https://discord.com/channels/1204097271768023090/1376573419038183474/1376573419038183474) `~5 min`
