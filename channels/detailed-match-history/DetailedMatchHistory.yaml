        - type: 10 # text
          content: |-
            ## Detailed Match History 📋
            We created a userscript to power up the official [Match History](https://stats.deadbydaylight.com/match-history/) with useful farming info:
            - **BP/hour**
              - *Real match-to-match times*
            - **Score categories**
              - *Did everyone max? Missing Objectives? Deviousness?*
            - **Time between matches**
              - *How fast did we ready up?*
            ### How to Use:
            1. Add a userscript manager to your browser (see [installing user scripts](https://greasyfork.org/en/help/installing-user-scripts))
            2. Install the userscript from [Greasy Fork](https://greasyfork.org/en/scripts/562996-dbd-detailed-match-history)
            3. Refresh the [Match History](https://stats.deadbydaylight.com/match-history/) site
            ### Screenshot:
